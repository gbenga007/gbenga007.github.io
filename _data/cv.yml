        summary: >
          Multiple VLMs used for VQA-based fine-grained image classification,
          treating VLM outputs as independent weak labelers in a Snorkel-based
          weak supervision framework.
        highlights:
          - "Venues: CVPR 2025 Workshop · WACV 2025"

      - name: Multi-View Cattle Reconstruction
        summary: >
          A synchronized 10-camera Azure Kinect rig for multi-view 3D capture of
          cattle. Extrinsic calibration, custom sensor synchronization, TSDF
          fusion, and PCA-based surface measurements for volumetric growth
          estimation; <6 mm alignment error across sessions.
        highlights:
          - "Venue: Sensors (MDPI), 2024"

