    Projects:
      - name: EGSA-PT — Edge-Guided Spatial Attention with Progressive Training
        summary: >
          A multi-task transformer for monocular depth estimation and segmentation
          of transparent objects. Edge-guided spatial attention plus progressive
          supervision improves transparent-region geometry by 13% over baselines.
        highlights:
